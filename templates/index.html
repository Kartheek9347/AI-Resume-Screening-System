<!DOCTYPE html>
<html>
<head>

<title>AI Resume Screening System</title>

<link rel="stylesheet" href="/static/style.css">

</head>

<body>

<div class="container">

<h1>AI Resume Screening System</h1>

<p class="subtitle">
Upload resumes and match them with job requirements using AI-based skill analysis.
</p>

<form action="/analyze" method="POST" enctype="multipart/form-data">

<div class="form-group">

<label>Job Description</label>

<textarea
name="job_description"
placeholder="Enter job description and required skills..."
required
></textarea>

</div>

<div class="form-group">

<label>Upload Resumes (PDF)</label>

<input
type="file"
name="resumes"
multiple
accept=".pdf"
required
>

</div>

<button class="btn-analyze" type="submit">

Analyze Candidates

</button>

</form>

</div>

</body>
</html>
